<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>To-Do List на Vue 3</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Подключаем внешний CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        [v-cloak] {
            display: none;
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <!-- Шапка с темой -->
        <div class="theme-wrapper">
            <button @click="toggleTheme" class="theme-toggle-btn" :title="isDarkTheme ? 'Светлая тема' : 'Тёмная тема'">
                <i :class="isDarkTheme ? 'fas fa-sun' : 'fas fa-moon'"></i>
            </button>
        </div>
        
        <div class="todo-container">
            <h1>📋 Список задач</h1>
            
            <!-- Форма добавления -->
            <div class="add-task">
                <input 
                    type="text" 
                    v-model="newTaskTitle"
                    @keyup.enter="addTask"
                    placeholder="Что нужно сделать?"
                    class="task-input"
                >
                <button @click="addTask" class="add-btn" :disabled="!newTaskTitle.trim()">
                    <i class="fas fa-plus"></i> Добавить
                </button>
            </div>
            
            <!-- Поиск -->
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="text" 
                    v-model="searchQuery"
                    placeholder="Поиск задач..."
                    class="search-input"
                >
            </div>
            
            <!-- Статистика и фильтры -->
            <div class="stats-filters">
                <div class="task-stats">
                    <span>Всего: {{ filteredTasks.length }}</span>
                    <span>Выполнено: {{ completedCount }}</span>
                </div>
                <div class="filter-buttons">
                    <button 
                        v-for="filter in filters" 
                        :key="filter"
                        @click="currentFilter = filter"
                        :class="['filter-btn', { active: currentFilter === filter }]"
                    >
                        {{ filter }}
                    </button>
                </div>
            </div>
            
            <!-- Список задач -->
            <div class="task-list">
                <div 
                    v-for="task in paginatedTasks" 
                    :key="task.id"
                    class="task-item"
                    :class="{
                        completed: task.completed,
                        'edit-mode': editingTask && editingTask.id === task.id
                    }"
                >
                    <div class="task-content" @dblclick="startEdit(task)">
                        <input 
                            type="checkbox" 
                            v-model="task.completed"
                            class="task-checkbox"
                        >
                        <span class="task-title">{{ task.title }}</span>
                        <div class="task-actions">
                            <button @click="startEdit(task)" class="edit-btn" title="Редактировать">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button @click="confirmDelete(task)" class="delete-btn" title="Удалить">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="task-edit" v-if="editingTask && editingTask.id === task.id">
                        <input 
                            type="text" 
                            v-model="editingTask.title"
                            @keyup.enter="saveEdit"
                            @keyup.esc="cancelEdit"
                            class="edit-input"
                            ref="editInput"
                        >
                        <div class="edit-actions">
                            <button @click="saveEdit" class="save-edit-btn"><i class="fas fa-check"></i></button>
                            <button @click="cancelEdit" class="cancel-edit-btn"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                </div>
                
                <!-- Состояния списка -->
                <div v-if="filteredTasks.length === 0" class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <p>Нет задач</p>
                </div>
            </div>
            
            <!-- Пагинация -->
            <div v-if="filteredTasks.length > 0" class="pagination">
                <button 
                    @click="currentPage--" 
                    :disabled="currentPage === 1"
                    class="page-btn"
                >
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span class="page-info">{{ currentPage }} / {{ totalPages }}</span>
                <button 
                    @click="currentPage++" 
                    :disabled="currentPage === totalPages"
                    class="page-btn"
                >
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        
        <!-- Диалог подтверждения удаления - вынесен внутрь #app -->
        <div v-if="showDeleteModal" class="modal-overlay" @click.self="closeDeleteModal">
            <div class="modal-content">
                <h3>Подтверждение удаления</h3>
                <p v-if="taskToDelete">Вы уверены, что хотите удалить задачу "{{ taskToDelete.title }}"?</p>
                <div class="modal-buttons">
                    <button @click="deleteTask" class="confirm-delete-btn">Удалить</button>
                    <button @click="closeDeleteModal" class="cancel-delete-btn">Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Подключаем Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Подключаем внешний JS -->
    <script src="js/app.js"></script>
</body>
</html>
